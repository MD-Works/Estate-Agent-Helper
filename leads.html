<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Leads — Estate Agent Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500&family=Syne:wght@400;500;600;700&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="dashboard.html" class="nav-brand"><span class="mark">✦</span> Estate Agent Helper</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="leads.html">My Leads</a></li>
      <li><a href="properties.html">Properties</a></li>
      <li><a href="inspections.html">Inspections</a></li>
      <li><a href="diary.html">Diary</a></li>
    </ul>
    <div class="nav-right">
      <span class="nav-agent" id="nav-agent"></span>
      <button id="btn-logout" class="btn btn-ghost btn-sm">Sign out</button>
      <button class="nav-toggle" id="nav-toggle">☰</button>
    </div>
  </div>
</nav>

<main class="page-content">

  <div class="page-header">
    <div>
      <div class="section-label">Pipeline</div>
      <h2>My Leads</h2>
      <p class="muted" id="leads-count">Loading…</p>
    </div>
    <a href="lead-form.html" class="btn btn-primary">+ New Lead</a>
  </div>

  <!-- Filters -->
  <div style="display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;align-items:center">
    <input
      type="search"
      id="search"
      placeholder="Search by name, phone or email…"
      style="flex:1;min-width:200px"
    />
    <select id="filter-status" style="width:auto;flex:none">
      <option value="">All Statuses</option>
      <option>New Lead</option>
      <option>Qualified</option>
      <option>Viewing Scheduled</option>
      <option>Offer Pending</option>
      <option>Closed</option>
      <option>Lost</option>
    </select>
    <select id="filter-type" style="width:auto;flex:none">
      <option value="">All Types</option>
      <option value="sale">Buy</option>
      <option value="rental">Rent</option>
      <option value="both">Both</option>
    </select>
  </div>

  <!-- Table -->
  <div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Type</th>
            <th>Budget</th>
            <th>Status</th>
            <th>Added</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="leads-table-body">
          <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--md-muted)">Loading leads…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<footer class="footer"><span class="mark">✦</span> Estate Agent Helper · MD Works <span class="mark">✦</span></footer>
<div id="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/sheets.js"></script>
<script src="js/leads.js"></script>
</body>
</html>
